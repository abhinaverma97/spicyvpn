appId: com.electron.spicyvpn
productName: SpicyVPN
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
compression: maximum
extraResources:
  - from: "resources/bin"
    to: "bin"
    filter:
      - "**/*.exe"
win:
  executableName: SpicyVPN
  requestedExecutionLevel: requireAdministrator
  icon: resources/icon.png
  artifactName: ${name}-${version}-setup.${ext}
  target:
    - nsis
extraResources:
  - from: "resources/bin"
    to: "bin"
    filter:
      - "**/*.exe"
# Force electron-builder to only include the English locale
# This saves about 15MB of space by stripping out 50+ unused languages.
directories:
  output: dist
  buildResources: build
files:
  - dist/main/index.js
  - dist/preload/index.js
  - dist/renderer/**/*
  - out/**/*
  - "!**/locales/*"
  - "**/locales/en-US.pak"
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.md"
  - "!**/.vscode/*"
