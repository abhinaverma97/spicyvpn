name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./android-client

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build libbox.aar from source (Foolproof)
      run: |
        mkdir -p app/libs
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init
        git clone -b v1.10.1 https://github.com/SagerNet/sing-box.git
        cd sing-box
        gomobile bind -v -a -trimpath -androidapi 21 -javapkg=io.nekohasekai -tags with_gvisor,with_quic,with_wireguard,with_ech,with_utls,with_clash_api,with_grpc -o ../app/libs/libbox.aar ./experimental/libbox

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.6

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SpicyVPN-Android-Debug
        path: android-client/app/build/outputs/apk/debug/*.apk
