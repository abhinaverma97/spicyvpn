name: Build Desktop (Windows · macOS · Linux)

on:
  push:
    branches: [main]
    paths: ['desktop/**', '.github/workflows/build-desktop.yml']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            xray_asset: Xray-windows-64.zip
            xray_bin: xray.exe
          - platform: macos-latest
            target: aarch64-apple-darwin
            xray_asset: Xray-macos-arm64-v8a.zip
            xray_bin: xray
          - platform: macos-latest
            target: x86_64-apple-darwin
            xray_asset: Xray-macos-64.zip
            xray_bin: xray
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            xray_asset: Xray-linux-64.zip
            xray_bin: xray

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            pkg-config libssl-dev xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Download Xray binary
        shell: bash
        run: |
          XRAY_VERSION="v26.2.6"
          mkdir -p src-tauri/binaries
          curl -L "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/${{ matrix.xray_asset }}" -o xray.zip
          unzip -o xray.zip ${{ matrix.xray_bin }} -d src-tauri/binaries/
          mv src-tauri/binaries/${{ matrix.xray_bin }} src-tauri/binaries/xray-${{ matrix.target }}${{ matrix.platform == 'windows-latest' && '.exe' || '' }}
          chmod +x src-tauri/binaries/xray-${{ matrix.target }}${{ matrix.platform == 'windows-latest' && '.exe' || '' }} || true

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          projectPath: desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: ignore
